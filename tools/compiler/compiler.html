<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Compiler - Project Toolsuite</title>
    <meta name="description" content="Online code editor and compiler for multiple languages.">
    <meta property="og:title" content="Code Compiler - Project Toolsuite">
    <meta property="og:description" content="Online code editor and compiler for multiple languages.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Code Compiler - Project Toolsuite">
    <meta name="twitter:description" content="Online code editor and compiler for multiple languages.">
    <meta name="twitter:image" content="https://cdn-icons-png.flaticon.com/512/3522/3522262.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">

    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

    <link rel="stylesheet" href="../../assets/css/notifications.css">
    <script src="../../assets/js/notifications.js" defer></script>

    <style>
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s;
        }

        /* Header */
        header {
            border-bottom: 4px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            margin: 0;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        /* Navigation Button */
        .nav-btn {
            background: transparent;
            border: none;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text);
            margin-right: 15px;
        }

        .nav-btn:hover {
            text-decoration: underline;
        }

        /* Main Workspace */
        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 70px;
            border-right: 4px solid var(--border);
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            flex-shrink: 0;
        }

        .side-icon {
            width: 45px;
            height: 45px;
            border: 2px solid var(--border);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            cursor: pointer;
            transition: 0.1s;
            background: var(--bg);
            color: var(--text);
        }

        .side-icon:hover {
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 0px var(--border);
        }

        .side-icon.active {
            background: var(--text);
            color: var(--bg);
            transform: none;
            box-shadow: none;
        }

        /* Editor Area */
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .editor-container {
            height: 65%;
            min-height: 100px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* CodeMirror Overrides */
        .CodeMirror {
            font-size: 14px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
        }

        .CodeMirror-cursor {
            border-left: 10px solid var(--text) !important;
            opacity: 0.5;
        }

        .CodeMirror-gutters {
            background: var(--sidebar);
            border-right: 1px solid var(--border);
        }

        /* Resizer */
        .resizer-h {
            height: 12px;
            cursor: row-resize;
            background: var(--border);
            opacity: 0.35;
            transition: opacity 0.2s;
            z-index: 10;
            flex-shrink: 0;
            position: relative;
        }

        .resizer-h:hover {
            opacity: 1;
        }

        .resizer-h::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 4px;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            opacity: 0.5;
        }

        /* Terminal */
        .terminal {
            flex-grow: 1;
            background: #0c0c0c;
            color: #cfcfcf;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            white-space: pre-wrap;
            border-top: 4px solid var(--border);
        }

        .terminal-header {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* Preview Container — replaces terminal in WEB mode */
        #previewContainer {
            display: none;
            height: 50%;
            border-top: 4px solid var(--border);
            flex-shrink: 0;
            flex-direction: column;
        }

        #previewContainer .preview-header {
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
            background: #0c0c0c;
            padding: 8px 20px;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        #previewFrame {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: white;
            display: block;
        }

        /* Action Buttons */
        .action-btn {
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 8px 20px;
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border);
            transition: 0.1s;
            white-space: nowrap;
        }

        .action-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px var(--border);
        }

        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                padding: 10px;
                gap: 8px;
            }

            h1 {
                font-size: 0.9rem;
            }

            aside {
                width: 55px;
            }

            .side-icon {
                width: 38px;
                height: 38px;
                font-size: 0.75rem;
            }

            .action-btn {
                padding: 6px 10px;
                font-size: 0.7rem;
                box-shadow: 2px 2px 0px var(--border);
            }

            .header-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
    <link rel="stylesheet" href="../../theme.css">
    <script src="../../theme.js"></script>
</head>

<body>

    <header>
        <div style="display: flex; align-items: center;">
            <button class="nav-btn" onclick="window.location.href='../../index.html'">
                [ &lt; ] HOME
            </button>

            <h1>Studio // Code_Runner</h1>
        </div>


        <div class="header-buttons" style="display: flex; gap: 10px; flex-wrap: wrap;">

            <button class="action-btn" onclick="runCode()" title="Run code (F5)">
                [ F5 ] EXECUTE
            </button>


            <button class="action-btn" onclick="copyCode()">
                COPY
            </button>


            <button class="action-btn" onclick="downloadCode()">
                DOWNLOAD
            </button>


            <button class="action-btn" onclick="clearConsole()">
                CLEAR
            </button>


            <button class="action-btn" onclick="toggleTheme()">
                TOGGLE THEME
            </button>

        </div>

    </header>

    <div class="main-container">
        <aside>
            <div class="side-icon active" data-lang="javascript" title="JavaScript">JS</div>
            <div class="side-icon" data-lang="python" title="Python 3">PY</div>
            <div class="side-icon" data-lang="web" title="HTML / CSS / JS">WEB</div>
        </aside>

        <div class="workspace">
            <div class="editor-container" id="editorPanel">
                <textarea id="editor"></textarea>
            </div>

            <div class="resizer-h" id="hResizer"></div>

            <!-- Terminal: visible for JS and Python modes -->
            <div class="terminal" id="terminalPanel">
                <div class="terminal-header">
                    <span>Console_Output</span>
                    <span id="status-indicator" style="color: #00ff00;">IDLE</span>
                </div>
                <div id="terminal-out">Waiting for input...</div>
            </div>

            <!-- Preview: visible for WEB mode only -->
            <div id="previewContainer">
                <div class="preview-header">Live Preview</div>
                <iframe id="previewFrame" sandbox="allow-scripts"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="compiler.js"></script>
</body>

</html>
